services:
  job-radar:
    build: .
    image: job-radar
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    working_dir: /app
    # Override with: docker compose run --rm job-radar python -m cli.collect ...
    command: ["python", "--version"]

  # Phase 6 interactive API (job_radar_SPEC §10). Reuses the job-radar image (it already
  # pip-installs requirements.txt incl. fastapi/uvicorn) — no separate Dockerfile.api.
  # Mediates browser writes; gated by JR_WRITE_KEY (.env). Profile-gated like the UI:
  # `docker compose --profile ui up` → http://localhost:8000 (docs at /docs).
  api:
    image: job-radar
    build: .
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    working_dir: /app
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    profiles: ["ui"]

  # Read-only Phase 5 UI (job_radar_SPEC §9). Static nginx serving ui/ + the
  # pre-built corpus/index.json (generated by `python -m cli.stats --export-index`).
  # Behind a profile so it never starts with the default `docker compose up` —
  # bring it up explicitly: `docker compose --profile ui up` → http://localhost:8080
  ui:
    image: nginx:alpine
    volumes:
      - ./ui:/usr/share/nginx/html
      - ./corpus/index.json:/usr/share/nginx/html/data/index.json:ro
    ports:
      - "8080:80"
    profiles: ["ui"]
