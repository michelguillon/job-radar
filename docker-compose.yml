services:
  job-radar:
    build: .
    image: job-radar
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    working_dir: /app
    # Override with: docker compose run --rm job-radar python -m cli.collect ...
    command: ["python", "--version"]

  # Phase 6 interactive API (job_radar_SPEC §10). Reuses the job-radar image (it already
  # pip-installs requirements.txt incl. fastapi/uvicorn) — no separate Dockerfile.api.
  # Mediates browser writes; gated by JR_WRITE_KEY (.env). Profile-gated like the UI:
  # `docker compose --profile ui up` → http://localhost:8000 (docs at /docs).
  api:
    image: job-radar
    build: .
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    working_dir: /app
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    profiles: ["ui"]

  # Phase 6 interactive frontend (job_radar_SPEC §10). React/Vite dev server; proxies
  # /api → the api service (same-origin, so the jr_write cookie rides along). Replaces
  # the retired Phase 5 static `ui` nginx service. Profile-gated like the api:
  # `docker compose --profile ui up` → http://localhost:8080 (API at :8000).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules          # anonymous volume preserves the image's node_modules
    ports:
      - "8080:3000"
    depends_on:
      - api
    profiles: ["ui"]
