  search_mode: selective

  # Three-tier role targeting (deviates from SPEC §6.5's flat list):
  #   primary             — universally on-target roles (role_score 2.0)
  #   conditional_primary — a role that is only a strong target in the right
  #                         context. Product is primary ONLY when the JD is in a
  #                         relevant domain, or pairs a strong + a weak signal;
  #                         otherwise it falls back to secondary (role_score 1.0).
  #   secondary           — acceptable but not core (role_score 1.0)
  target_roles:
