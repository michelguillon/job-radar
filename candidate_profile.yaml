# candidate_profile.yaml — Job Radar Phase 2 scoring input
#
# Candidate definition used by the scoring engine.
#
# This is a MANAGED, VERSIONED asset. It evolves as skills, projects, target
# roles, and search strategy change. Bump profile_version and last_updated on
# every edit.
#
# Design principle:
# - This file describes Michel.
# - It does not contain scoring logic.
# - It does not contain generic blocking rules.
# - It should represent long-term career direction, not recent application activity.
#
# Important schema boundary:
# - Enum-bound fields must use exact values from models/record.py.
# - Nuance that is not represented in the closed vocabulary belongs in:
#   career_patterns, skills, experience_anchors, positive_signals, or negative_signals.
#
# search_mode:
#   selective = high-conviction opportunities only
#   active    = stretch opportunities surfaced separately
#   broad     = all opportunities surfaced with contextual fit labels

profile_version: "1.2"
last_updated: "2026-06-09"

candidate:
