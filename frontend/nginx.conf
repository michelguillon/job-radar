# Job Radar frontend — prod nginx: serve the built SPA + proxy /api → the api container
# (job_radar_SPEC §10.4, §10.9). Used by Dockerfile.prod. Local dev uses the Vite dev
# server (Dockerfile.dev) instead, which has its own /api proxy, so this file only ever
# runs in the nginx prod image.
#
# The upstream is the api's container_name (job-radar-api), NOT the bare `api` service
# alias: in the Caddy-fronted prod topology this nginx joins the shared `caddy` network,
# where service aliases collide across apps but container_names stay unique (PLAYBOOK
# gotcha #6). docker-compose.prod.yml sets `container_name: job-radar-api` to match.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html (client-side hash tabs, no server routes).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived hashed assets cache hard; index.html must not.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → FastAPI backend (same-origin /api, so the jr_write cookie rides along).
    location /api/ {
        proxy_pass http://job-radar-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
