# Job Radar frontend — prod nginx: serve the built SPA + proxy /api → the api container
# (job_radar_SPEC §10.4). Used by Dockerfile.prod. Local dev uses the Vite dev server
# (Dockerfile.dev) instead, which has its own /api proxy. Public deployment (§10.9) is a
# deferred follow-up — on the shared caddy network the upstream would become the api's
# container_name; for local prod-build verification the compose service alias `api` works.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html (client-side hash tabs, no server routes).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived hashed assets cache hard; index.html must not.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → FastAPI backend (same-origin /api, so the jr_write cookie rides along).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
