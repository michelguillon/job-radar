    url: https://jobs.indexventures.com
    status: requires_js
    platform: custom
    notes: >-
      Inspected. Custom Vue + Elasticsearch frontend, JS-rendered. Page source
      exposed Elasticsearch credentials but the account had no search
      permissions. No usable public API.
