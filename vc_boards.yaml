# VC portfolio job boards (docs/job_radar_SPEC.md §5.3 Step 5).
#
# Step 5 gate outcome (2026-06-09): ALL boards are JavaScript-rendered SPAs
# with no accessible public API — BeautifulSoup scraping is not viable for any.
# Three were inspected directly (Balderton, Atomico, Index Ventures); the rest
# share the same SPA pattern and are treated the same pending inspection.
# See docs/job_radar_LEARNINGS.md "Learning 10 — VC board scraping is not
# viable with BeautifulSoup".
#
# platform: consider | getro | custom | unknown
# status:   requires_js  (none are scrapable with BeautifulSoup)
boards:
  - name: Balderton
    url: https://jobs.balderton.com
    status: requires_js
    platform: consider
    notes: >-
      Inspected. Built on the Consider platform — a JS-rendered SPA. Raw HTML
      contains only framework scaffolding, zero job listings. No public API.
  - name: Atomico
    url: https://jobs.atomico.com
