# Seed companies for the collection phase.
#
# Two tiers:
#   1. VERIFIED — the original 17, slugs confirmed against live ATS boards (Phase 1–3).
#   2. UNVERIFIED — Production Company Universe v1 (SPEC §11.1), merged 2026-06-10. Slugs
#      are BEST-GUESS. Verify before a real run: `python -m cli.collect --dry-run --source
#      <ats> --company <slug>`. A 404 means the slug is wrong or the company isn't on that
#      ATS (hyperscalers/large incumbents mostly use Workday/internal, not public boards) —
#      fix or delete the entry. Collection silently skips a 404'd company, so unverified
#      entries cost nothing until their slug resolves.
#
# Duplicates across tiers are deduped by company (verified entry wins, incl. its ATS).
