<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Radar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◎</span> Job&nbsp;Radar
      <span class="generated" id="generated"></span>
    </div>
    <div class="statbar" id="statbar"><!-- corpus stats injected here --></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="browse">Browse</button>
    <button class="tab" data-view="pipeline">Pipeline</button>
    <span class="result-count" id="resultCount"></span>
  </div>

  <main class="layout">
    <!-- ───────────────── Filters ───────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="filter-block">
        <input type="search" id="search" placeholder="Search company or role…" autocomplete="off">
      </div>

      <div class="filter-block">
        <label class="filter-title">Fit score</label>
        <div class="range-row">
          <input type="number" id="fitMin" min="1" max="10" value="1" aria-label="min fit">
          <span class="range-sep">–</span>
          <input type="number" id="fitMax" min="1" max="10" value="10" aria-label="max fit">
        </div>
      </div>

      <div class="filter-block">
        <label class="filter-title">Priority score</label>
        <div class="range-row">
          <input type="number" id="priMin" min="1" max="10" value="1" aria-label="min priority">
          <span class="range-sep">–</span>
          <input type="number" id="priMax" min="1" max="10" value="10" aria-label="max priority">
        </div>
      </div>

      <div class="filter-block">
        <label class="filter-title toggle-row">
          <span>Location workable only</span>
          <input type="checkbox" id="locWorkable">
        </label>
      </div>

      <div class="filter-block" id="fitLabelGroup">
        <label class="filter-title">Fit label</label>
        <div class="checks" id="fitLabelChecks"></div>
      </div>

      <div class="filter-block" id="statusGroup">
        <label class="filter-title">Status</label>
        <div class="checks" id="statusChecks"></div>
      </div>

      <div class="filter-block" id="domainGroup">
        <label class="filter-title">Domain</label>
        <div class="checks scroll" id="domainChecks"></div>
      </div>

      <div class="filter-block" id="roleGroup">
        <label class="filter-title">Role type</label>
        <div class="checks scroll" id="roleChecks"></div>
      </div>

      <button class="reset" id="resetFilters">Reset filters</button>
    </aside>

    <!-- ───────────────── Content ───────────────── -->
    <section class="content">
      <!-- Browse: table -->
      <div id="browseView">
        <table class="grid" id="grid">
          <thead>
            <tr>
              <th data-sort="company">Company</th>
              <th data-sort="title">Role</th>
              <th data-sort="fit_label">Fit</th>
              <th data-sort="fit_score" class="num">Score</th>
              <th data-sort="priority_score" class="num">Pri</th>
              <th data-sort="location">Location</th>
              <th data-sort="application_status">Status</th>
              <th data-sort="date_first_seen">First seen</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody id="gridBody"></tbody>
        </table>
        <p class="empty" id="browseEmpty" hidden>No roles match the current filters.</p>
      </div>

      <!-- Pipeline: grouped by status -->
      <div id="pipelineView" hidden></div>
    </section>
  </main>

  <!-- ───────────────── Detail drawer ───────────────── -->
  <div class="drawer-scrim" id="scrim" hidden></div>
  <aside class="drawer" id="drawer" hidden aria-label="role detail"></aside>

  <script src="app.js"></script>
</body>
</html>
