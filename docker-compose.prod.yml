# docker-compose.prod.yml — job-radar homeserver (M720q) prod overlay (SPEC §10.9).
# Layered on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile ui \
#       up -d --build api frontend
#
# Differences from dev: the api drops --reload and its host port; the frontend becomes the
# nginx prod image (Dockerfile.prod multi-stage build, not the Vite dev server) and is the
# single Caddy entry point; both restart unless stopped. The api keeps the repo bind-mount
# (.:/app from the base compose) so the host corpus/ + .env persist — the homeserver runs
# from the cloned repo, and the base image bakes in no source (only requirements.txt).
#
# Caddy-fronted topology (PLAYBOOK.md): the frontend nginx is the single entry point Caddy
# proxies to, by container_name over the shared external `caddy` network; the api stays on
# the per-app `default` network only (never published to the host). Host ports are dropped
# with `!override []` — Compose CONCATENATES `ports:` across overlays, so a bare `[]` would
# NOT remove the dev bindings (playbook gotcha #3). The api+frontend keep their base
# `profiles: ["ui"]`, so bring them up with `--profile ui` (and name them explicitly, so the
# throwaway `job-radar` CLI-runner service isn't started alongside).
#
# Prereq on the server (one-time): `docker network create caddy`.
#
# NB: Compose also concatenates the `volumes:` list, so the dev frontend's ./frontend:/app +
# /app/node_modules mounts survive into the merged prod config. They're inert here — nginx
# serves /usr/share/nginx/html (the baked Vite bundle), never /app — so the production bundle
# is what ships.
services:
  api:
    container_name: job-radar-api              # nginx targets this by name (gotcha #6)
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]  # no --reload
    restart: unless-stopped
    ports: !override []                        # internal-only; reached via the default net
    networks:
      # Declaring networks here OVERRIDES the implicit default attachment, so `default` must be
      # listed explicitly (intra-stack: nginx/frontend reaches the api by container_name). `tracing`
      # is the shared external network the Langfuse stack lives on — the pipeline CLIs run inside
      # this container (`docker compose run … python -m cli.label/score`) and reach the Langfuse web
      # container by name via LANGFUSE_BASE_URL (SPEC §16, deviation 46). Unlike `caddy`, joining
      # `tracing` is safe — no service-alias collisions (we use the container_name, not `api`).
      - default
      - tracing

  # Multi-stage build (Node → nginx-alpine). nginx serves the static bundle on :80 and
  # proxies /api/* → job-radar-api:8000 (frontend/nginx.conf, by container_name).
  frontend:
    container_name: job-radar-frontend         # Caddy: reverse_proxy job-radar-frontend:80
    image: job-radar-frontend-prod             # distinct from the dev image so a prod build
                                               # doesn't clobber the Vite-dev-server image
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports: !override []                        # Caddy reaches :80 over the caddy network
    networks:
      - default                                # reach job-radar-api (intra-stack)
      - caddy                                  # be reachable by the Caddy container

networks:
  # Shared, created once on the server with `docker network create caddy`. Only the
  # entry-point container (frontend) joins it; the api stays off it (gotcha #6 — service
  # aliases like `api` collide across apps on the shared network, container_names don't).
  caddy:
    external: true
  # Shared observability network the self-hosted Langfuse stack lives on. Created once on the
  # server (`docker network create tracing`); cv-tailor is already attached. The api joins it so
  # in-container pipeline runs can export traces to langfuse-langfuse-web-1:3000 (SPEC §16).
  tracing:
    external: true
  default: {}
